<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一頁式閱讀報告工作台 - 小壁虎老師設計</title>
    
    <script>
        /** * 👨‍🏫 教師自訂區：請在下方引號內填入您的 Google 表單繳交連結 */
        const TEACHER_FORM_URL = "https://forms.gle/p1iWDPmiNWHtadKi7";
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --green: #c8e6c9;
            --pink: #f8bbd0;
            --blue: #bbdefb;
            --yellow: #fff9c4;
            --accent: #e53935;
            --submit-blue: #1a73e8;
        }

        /* 啟動頁遮罩 */
        #welcome-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(44, 62, 80, 0.95);
            display: flex; justify-content: center; align-items: center;
            z-index: 999;
        }

        .instruction-card {
            background: white; width: 600px; padding: 30px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            line-height: 1.6;
        }
        .instruction-card h2 { color: #2c3e50; text-align: center; border-bottom: 3px solid var(--green); padding-bottom: 10px; margin-bottom: 5px; }
        .instruction-card .author { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 20px; }
        
        .checkbox-area { text-align: center; margin-top: 25px; padding: 20px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        #start-btn { margin-top: 15px; padding: 12px 60px; font-size: 18px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        #start-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; color: #7f8c8d; }
        #start-btn:not(:disabled) { background-color: #27ae60; color: white; box-shadow: 0 4px #219150; }

        /* 工作台 */
        body { font-family: "Microsoft JhengHei", sans-serif; background-color: #2c3e50; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .paper { width: 850px; background-color: white; padding: 30px 40px; position: relative; box-shadow: 10px 10px 0px rgba(0,0,0,0.2); border-radius: 5px; }
        
        /* 文字溢出與換行修正 */
        textarea { 
            width: 100%; 
            border: none; 
            background: transparent; 
            resize: none; 
            outline: none; 
            font-family: inherit; 
            font-size: 14px; 
            line-height: 1.5; 
            overflow-wrap: break-word; /* 強制長字換行 */
            word-wrap: break-word;
            white-space: pre-wrap; /* 保留空格與換行 */
            overflow-y: auto; /* 超出內容顯示滾動條 */
        }

        .instruction-tag { background-color: var(--yellow); padding: 12px; width: 250px; position: absolute; top: 20px; left: 20px; font-size: 12px; transform: rotate(-2deg); box-shadow: 2px 2px 5px rgba(0,0,0,0.1); line-height: 1.5; z-index: 10; }
        .top-header { display: flex; justify-content: flex-end; margin-bottom: -10px; }
        .name-box { background-color: var(--green); padding: 8px 15px; width: 200px; position: relative; border-radius: 3px; z-index: 5; }
        .header-container { text-align: center; margin-bottom: 20px; }
        .title-box { border: 2px solid #ddd; padding: 8px 40px; width: fit-content; margin: 0 auto 5px; font-size: 28px; font-weight: bold; position: relative; }
        .author-tag { font-size: 14px; color: #666; font-weight: bold; background: #f1f1f1; padding: 4px 12px; border-radius: 12px; display: inline-block; margin-bottom: 15px; border: 1px solid #ccc; }
        .pushpin { width: 10px; height: 10px; background-color: var(--accent); border-radius: 50%; position: absolute; top: -6px; left: 50%; transform: translateX(-50%); z-index: 5; box-shadow: 1px 1px 2px rgba(0,0,0,0.3); }

        .mission-selector { margin-top: 80px; text-align: center; }
        .step-title { font-size: 18px; color: #2c3e50; font-weight: bold; margin: 15px 0 10px; display: block; }
        .mission-btn { padding: 8px 16px; margin: 4px; border-radius: 20px; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .mission-btn.active { background: var(--green); border-color: #4caf50; font-weight: bold; }
        
        #mission-briefing { display: none; background-color: #fff3e0; border: 2px dashed #ff9800; padding: 15px; margin: 15px 0; border-radius: 8px; font-size: 15px; text-align: left; }
        .keyword-tag { background-color: #ffe0b2; color: #e65100; padding: 2px 8px; border-radius: 4px; font-weight: bold; margin-left: 5px; }
        
        .platform-box { background-color: #f0f4f8; padding: 12px; border-radius: 8px; margin: 10px 0 20px; display: flex; align-items: center; justify-content: center; gap: 15px; border: 1px solid #d1d9e0; }
        .platform-link { background-color: #2c3e50; color: white; padding: 8px 18px; border-radius: 5px; text-decoration: none; font-weight: bold; font-size: 13px; }
        
        .info-section { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 15px; margin-bottom: 15px; }
        .input-box { background-color: var(--green); padding: 10px; position: relative; border-radius: 3px; }
        .report-main { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        .nine-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; } 
        .grid-cell { background-color: var(--green); height: 110px; padding: 8px; position: relative; border-radius: 3px; overflow: hidden; }
        .side-column { display: flex; flex-direction: column; gap: 12px; }
        .pink-box { background-color: var(--pink); height: 230px; padding: 15px; position: relative; overflow: hidden; }
        .blue-box { background-color: var(--blue); height: 110px; padding: 15px; position: relative; overflow: hidden; }
        .yellow-box { background-color: var(--yellow); padding: 12px; position: relative; font-size: 12px; }
        
        .char-count { position: absolute; bottom: 3px; right: 8px; font-size: 9px; color: #777; }
        .warning-msg { color: #d32f2f; font-size: 9px; position: absolute; bottom: 3px; left: 8px; display: none; }
        
        .btn-area { margin-top: 20px; width: 850px; display: flex; flex-direction: column; gap: 12px; }
        .progress-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #ecf0f1; padding: 15px; border-radius: 8px; border: 1px dashed #bdc3c7; }
        .btn-work { padding: 12px; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .btn-finish { padding: 15px; background-color: #e67e22; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; box-shadow: 0 4px #d35400; font-weight: bold; }
        .form-link-btn { padding: 12px; background-color: var(--submit-blue); color: white; border: none; border-radius: 5px; font-size: 17px; cursor: pointer; text-decoration: none; text-align: center; font-weight: bold; box-shadow: 0 4px #1557b0; }
        .reset-btn { background: none; border: none; color: #999; font-size: 11px; cursor: pointer; text-decoration: underline; align-self: flex-end; }
    </style>
</head>
<body>

<script>
    // 在匯出時強制調整文字渲染
    async function exportPDF() {
        const btn = document.querySelector('.btn-finish'); 
        const name = document.getElementById('user_name').value.trim() || "學生";
        btn.innerText = "正在優化文字排版並產出..."; 
        document.getElementById('mission-ui').style.display = 'none';
        
        try {
            // 優化：匯出前強制隱藏滾動條，確保截圖完整
            document.querySelectorAll('textarea').forEach(t => t.style.overflowY = 'hidden');

            const canvas = await html2canvas(document.getElementById('pdf-area'), { 
                scale: 2,
                useCORS: true,
                logging: false,
                windowWidth: 850
            });
            
            const { jsPDF } = window.jspdf; 
            const pdf = new jsPDF('p', 'mm', 'a4');
            const pageWidth = pdf.internal.pageSize.getWidth();
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pageWidth, (canvas.height * pageWidth) / canvas.width);
            pdf.save(`${new Date().toISOString().slice(0,10).replace(/-/g,"")}_閱讀報告_${name}.pdf`);
            alert("PDF 下載成功！長文字已自動換行處理。");
        } catch (e) { 
            alert("匯出失敗，請檢查瀏覽器相容性。"); 
        } finally { 
            document.getElementById('mission-ui').style.display = 'block'; 
            document.querySelectorAll('textarea').forEach(t => t.style.overflowY = 'auto');
            btn.innerText = "✅ 下載 PDF 報告"; 
        }
    }
</script>
